name: Bump version

on:
  push:

permissions:
  contents: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version in index.html
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          file_path = Path("index.html")
          html = file_path.read_text(encoding="utf-8")
          match = re.search(r"const APP_VERSION = '(\d+)\.(\d+)\.(\d+)';", html)
          if not match:
            raise SystemExit("APP_VERSION not found")

          major, minor, patch = map(int, match.groups())
          next_version = f"{major}.{minor}.{patch + 1}"
          html = re.sub(
              r"const APP_VERSION = '\d+\.\d+\.\d+';",
              f"const APP_VERSION = '{next_version}';",
              html,
              count=1,
          )
          html = re.sub(
              r'<span id="appVersion">\d+\.\d+\.\d+</span>',
              f'<span id="appVersion">{next_version}</span>',
              html,
              count=1,
          )
          file_path.write_text(html, encoding="utf-8")
          print(f"Bumped APP_VERSION to {next_version}")
          PY

      - name: Commit updated version
        run: |
          if git diff --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump app version [skip ci]"
          git push
